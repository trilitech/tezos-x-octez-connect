<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tezos X — Wallet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    header { background: linear-gradient(135deg, #0f2e1e 0%, #0f172a 100%);
             padding: 1.5rem 2rem; border-bottom: 1px solid #1e293b;
             display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    .badge { font-size: .7rem; font-weight: 700; text-transform: uppercase;
             letter-spacing: .06em; padding: .2rem .6rem; border-radius: 100px; }
    .badge-green { background: #064e3b; color: #34d399; }
    .badge-gray  { background: #1e293b; color: #64748b; }

    main { max-width: 600px; margin: 3rem auto; padding: 0 1.5rem; }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.25rem; }
    .card h2 { font-size: .85rem; font-weight: 700; text-transform: uppercase;
               letter-spacing: .06em; color: #64748b; margin-bottom: 1rem; }

    /* Account bar */
    .account-row { display: flex; align-items: center; gap: .75rem; }
    .avatar { width: 36px; height: 36px; border-radius: 10px; background: #0d9488;
              display: flex; align-items: center; justify-content: center;
              font-size: 1.1rem; flex-shrink: 0; }
    .account-info { flex: 1; }
    .account-name { font-weight: 600; font-size: .9rem; }
    .account-addr { font-size: .75rem; color: #64748b; font-family: monospace; }

    /* Network tags */
    .net-list { display: flex; flex-direction: column; gap: .5rem; margin: .75rem 0; }
    .net-item { display: flex; align-items: center; gap: .6rem; background: #0f172a;
                border: 1px solid #334155; border-radius: 8px; padding: .6rem .875rem; }
    .net-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .net-dot-l1 { background: #3b82f6; }
    .net-dot-l2 { background: #10b981; }
    .net-name { font-weight: 600; font-size: .875rem; }
    .net-chain { font-size: .72rem; font-family: monospace; color: #64748b; }

    /* Request card */
    .request { border: 2px solid #f59e0b; border-radius: 12px;
               background: #1c1917; padding: 1.25rem; }
    .request-title { font-weight: 700; font-size: 1rem; margin-bottom: .25rem; }
    .request-from  { font-size: .8rem; color: #94a3b8; margin-bottom: 1rem; }
    .request-label { display: inline-block; font-size: .7rem; font-weight: 700;
                     text-transform: uppercase; letter-spacing: .06em;
                     padding: .15rem .55rem; border-radius: 100px;
                     background: #451a03; color: #f59e0b; margin-bottom: .75rem; }

    .op-detail { background: #0f172a; border: 1px solid #334155; border-radius: 8px;
                 padding: .75rem 1rem; margin-bottom: .75rem; }
    .op-detail-row { display: flex; justify-content: space-between;
                     font-size: .82rem; margin-bottom: .25rem; }
    .op-detail-row:last-child { margin-bottom: 0; }
    .op-detail-key { color: #64748b; }
    .op-detail-val { font-family: monospace; color: #e2e8f0; text-align: right; word-break: break-all; }

    .btn-row { display: flex; gap: .75rem; margin-top: 1rem; }
    .btn { display: inline-flex; align-items: center; gap: .5rem; flex: 1; justify-content: center;
           padding: .65rem; border-radius: 8px; border: none;
           font-size: .9rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn-approve { background: #10b981; color: #fff; }
    .btn-approve:not(:disabled):hover { background: #059669; }
    .btn-reject  { background: transparent; color: #ef4444; border: 1px solid #ef4444; }
    .btn-reject:not(:disabled):hover  { background: #7f1d1d22; }

    /* Activity log */
    .log-entry { font-size: .8rem; padding: .4rem 0;
                 border-bottom: 1px solid #1e293b; display: flex; gap: .5rem; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #475569; font-family: monospace; flex-shrink: 0; }
    .log-msg  { color: #94a3b8; word-break: break-all; }
    .log-msg.ok  { color: #10b981; }
    .log-msg.err { color: #ef4444; }

    .empty-state { color: #475569; font-size: .875rem; text-align: center; padding: 1rem 0; }

    #request-section { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Tezos X — Wallet POC</h1>
    <span class="badge badge-green" id="status-badge">Ready</span>
  </header>

  <main>
    <!-- Account card -->
    <div class="card">
      <h2>Account</h2>
      <div class="account-row">
        <div class="avatar">🔑</div>
        <div class="account-info">
          <div class="account-name">POC Wallet</div>
          <div class="account-addr" id="account-addr">loading…</div>
        </div>
      </div>
    </div>

    <!-- Incoming request card -->
    <div id="request-section">
      <!-- filled dynamically -->
    </div>

    <!-- Activity log -->
    <div class="card">
      <h2>Activity</h2>
      <div id="log-list"><div class="empty-state">No activity yet</div></div>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
