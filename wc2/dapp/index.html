<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tezos X — dApp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    header { background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
             padding: 1.5rem 2rem; border-bottom: 1px solid #1e293b;
             display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    .badge { font-size: .7rem; font-weight: 700; text-transform: uppercase;
             letter-spacing: .06em; padding: .2rem .6rem; border-radius: 100px;
             background: #1e3a5f; color: #60a5fa; }

    main { max-width: 640px; margin: 3rem auto; padding: 0 1.5rem; }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.25rem; }
    .card h2 { font-size: .85rem; font-weight: 700; text-transform: uppercase;
               letter-spacing: .06em; color: #64748b; margin-bottom: 1rem; }

    .status-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-idle    { background: #475569; }
    .dot-waiting { background: #f59e0b; animation: pulse 1.2s infinite; }
    .dot-ok      { background: #10b981; }
    .dot-err     { background: #ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .status-label { font-size: .9rem; color: #94a3b8; }
    .status-label strong { color: #e2e8f0; }

    .uri-box { background: #0f172a; border: 1px solid #334155; border-radius: 8px;
               padding: .75rem 1rem; font-size: .72rem; font-family: monospace;
               color: #7dd3fc; word-break: break-all; line-height: 1.5; }

    .btn { display: inline-flex; align-items: center; gap: .5rem;
           padding: .6rem 1.25rem; border-radius: 8px; border: none;
           font-size: .9rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #2563eb; }
    .btn-teal    { background: #0d9488; color: #fff; }
    .btn-teal:not(:disabled):hover { background: #0f766e; }
    .btn-outline { background: transparent; color: #94a3b8;
                   border: 1px solid #334155; }
    .btn-outline:not(:disabled):hover { border-color: #64748b; color: #e2e8f0; }

    .op-row { display: flex; align-items: flex-start; gap: 1rem;
              padding: .875rem 0; border-bottom: 1px solid #1e293b; }
    .op-row:last-child { border-bottom: none; padding-bottom: 0; }
    .op-icon { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
               display: flex; align-items: center; justify-content: center;
               font-size: 1rem; }
    .op-icon-l1   { background: #1e3a5f; }
    .op-icon-l2   { background: #064e3b; }
    .op-info { flex: 1; }
    .op-title { font-weight: 600; font-size: .9rem; margin-bottom: .2rem; }
    .op-sub   { font-size: .78rem; color: #64748b; }
    .op-hash  { font-size: .72rem; font-family: monospace; color: #7dd3fc;
                margin-top: .3rem; word-break: break-all; }
    .op-status { font-size: .8rem; font-weight: 600; white-space: nowrap; }
    .op-status.pending { color: #f59e0b; }
    .op-status.done    { color: #10b981; }
    .op-status.err     { color: #ef4444; }

    #section-ops { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Tezos X — dApp POC</h1>
    <span class="badge">Phase 3b</span>
  </header>

  <main>
    <!-- Connection card -->
    <div class="card" id="card-connect">
      <h2>Connection</h2>
      <div class="status-row">
        <div class="dot dot-idle" id="conn-dot"></div>
        <div class="status-label" id="conn-label">Not connected</div>
      </div>
      <div id="uri-section" style="display:none; margin-bottom:1rem;">
        <div style="font-size:.78rem; color:#64748b; margin-bottom:.5rem;">Pairing URI — paste into wallet:</div>
        <div class="uri-box" id="uri-display"></div>
      </div>
      <div style="display:flex; gap:.75rem; flex-wrap:wrap;">
        <button class="btn btn-primary" id="btn-connect">Connect wallet</button>
        <button class="btn btn-outline" id="btn-disconnect" style="display:none;">Disconnect</button>
      </div>
    </div>

    <!-- Operations card -->
    <div class="card" id="section-ops">
      <h2>Operations</h2>
      <div class="op-row">
        <div class="op-icon op-icon-l1">⛓</div>
        <div class="op-info">
          <div class="op-title">Transfer on L1</div>
          <div class="op-sub">1 mutez · Shadownet · tezos:NetXsqzbfFenSTS</div>
          <div class="op-hash" id="l1-hash" style="display:none;"></div>
        </div>
        <div style="display:flex; flex-direction:column; gap:.5rem; align-items:flex-end;">
          <button class="btn btn-primary" id="btn-l1" disabled>Send</button>
          <span class="op-status" id="l1-status"></span>
        </div>
      </div>
      <div class="op-row">
        <div class="op-icon op-icon-l2">🔷</div>
        <div class="op-info">
          <div class="op-title">Call contract on Michelson interface</div>
          <div class="op-sub">KT1PWPM4… · entrypoint default · tezos:NetXH12Aer3be93</div>
          <div class="op-hash" id="l2-hash" style="display:none;"></div>
        </div>
        <div style="display:flex; flex-direction:column; gap:.5rem; align-items:flex-end;">
          <button class="btn btn-teal" id="btn-l2" disabled>Send</button>
          <span class="op-status" id="l2-status"></span>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
